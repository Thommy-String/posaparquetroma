<body>
  <div id="root"></div>
  <!-- Cookie Banner: lo script PRIMA del banner definisce le funzioni globali -->
  <script>
  function _cb_emit(v){try{window.dispatchEvent(new CustomEvent('gdpr-consent-changed',{detail:{value:v}}));}catch(e){}}
  function _cb_set(n,v){var d=new Date();d.setTime(d.getTime()+31536e6);document.cookie=n+'='+v+';expires='+d.toUTCString()+';path=/;SameSite=Lax';_cb_emit(v);}
  function _cb_hide(){var b=document.getElementById('cookie-banner');if(b)b.style.cssText='display:none!important';}
  function _cb_accept(){_cb_hide();_cb_set('gdpr_consent','accepted');try{if(typeof window.__loadGtag==='function')window.__loadGtag();}catch(e){}}
  function _cb_decline(){_cb_hide();_cb_set('gdpr_consent','declined');try{if(typeof gtag==='function')gtag('consent','update',{'analytics_storage':'denied','ad_storage':'denied'});}catch(e){}}
  // Se il cookie esiste già, nascondi subito (prima ancora che il CSS carichi)
  if(document.cookie.indexOf('gdpr_consent=')!==-1){document.write('<style>#cookie-banner{display:none!important}</style>');}
  </script>
  <!-- Cookie Banner HTML -->

    <div class="cookie-buttons">
      <button id="accept-cookies" onclick="_cb_accept()">Accetta</button>
      <button id="decline-cookies" onclick="_cb_decline()">Rifiuta</button>
    </div>
  </div>
